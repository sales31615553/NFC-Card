<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shahroz Khan - Digital Card</title>

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
    background: #0f0f10;
    color: white;
    display: flex;
    justify-content: center;
}

.card {
    width: 100%;
    max-width: 420px;
    padding: 25px;
}

.glass {
    background: rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: 20px;
    backdrop-filter: blur(12px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

h1 {
    margin: 0;
    font-size: 26px;
}

.role {
    color: #aaa;
    margin-top: 5px;
}

.company {
    margin-top: 10px;
    font-weight: bold;
    color: #4da3ff;
}

.btn {
    display: block;
    text-align: center;
    padding: 14px;
    margin-top: 12px;
    border-radius: 12px;
    text-decoration: none;
    color: white;
    font-weight: 500;
}

.call { background: #28a745; }
.whatsapp { background: #25D366; }
.email { background: #0072ff; }
.brochure { background: #ff9800; }

.section {
    margin-top: 15px;
    font-size: 14px;
    color: #ccc;
    line-height: 1.6;
}
</style>
</head>

<body>

<div class="card">

    <div class="glass">
        <h1>Shahroz Khan</h1>
        <div class="role">Sales Officer</div>
        <div class="company">Hard Screw</div>

        <a class="btn call" href="tel:31615553">📞 Call Now</a>

        <a class="btn whatsapp"
        href="https://wa.me/97431615553?text=Hello%20Shahroz%2C%20I%20want%20to%20inquire%20about%20industrial%20supplies">
        💬 WhatsApp
        </a>

        <a class="btn email" href="mailto:sales1@hardscrew.qa">
        📧 Send Email
        </a>

        <a class="btn brochure" href="https://hardscrew.qa/wp-content/uploads/2025/06/Profile-QA.pdf" target="_blank">
        📄 Company Brochure
        </a>

        <div class="section">
            📍 Industrial Area, Street 13, Building 101, Qatar
        </div>

        <a class="btn" style="background:#444;" href="tel:31615553">
        ⭐ Save Contact
        </a>

    </div>

</div>

</body>
</html>
